<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotebookLM 工作坊 · 课程资源</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f7f7f3; min-height: 100vh; padding: 2rem 1.2rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 1.25rem; font-weight: 700; color: #1a1a1a; }
  .viewer-count { font-size: 0.82rem; color: #aaa; margin-top: 0.3rem; min-height: 1.2em; }
  .waiting { text-align: center; padding: 3rem 1rem; }
  .waiting-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .waiting p { color: #aaa; font-size: 0.9rem; line-height: 1.6; }
  .links-list { display: flex; flex-direction: column; gap: 0.85rem; }
  .link-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e8; padding: 1.1rem 1.2rem; text-decoration: none; display: flex; align-items: center; gap: 1rem; transition: transform 0.12s, box-shadow 0.12s; animation: slideIn 0.3s ease; }
  .link-card:active { transform: scale(0.98); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .link-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .icon-0 { background: #e8f5e9; }
  .icon-1 { background: #fce4ec; }
  .icon-2 { background: #e3f2fd; }
  .icon-3 { background: #fff8e1; }
  .icon-4 { background: #f3e5f5; }
  .icon-5 { background: #e0f2f1; }
  .icon-6 { background: #fbe9e7; }
  .icon-7 { background: #e8eaf6; }
  .icon-8 { background: #f5f5f5; }
  .icon-9 { background: #e3f2fd; }
  .icon-10 { background: #e8f5e9; }
  .icon-11 { background: #fff8e1; }
  .icon-12 { background: #fce4ec; }
  .link-info { flex: 1; min-width: 0; }
  .link-num { font-size: 0.7rem; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; }
  .link-title { font-size: 0.98rem; font-weight: 600; color: #1a1a1a; margin-top: 0.1rem; }
  .link-url { font-size: 0.76rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.15rem; }
  .arrow { color: #ccc; font-size: 1.1rem; flex-shrink: 0; }
  .new-badge { background: #dcfce7; color: #166534; font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
  .copy-btn { display: none; width: 100%; margin-top: 1.2rem; padding: 0.7rem; background: #f0f0f0; color: #333; border: none; border-radius: 12px; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .copy-btn:active { background: #e0e0e0; }
  .copy-btn.copied { background: #dcfce7; color: #166534; }
  .notice { text-align: center; margin-top: 1rem; font-size: 0.76rem; color: #ccc; }
  .footer { text-align: center; margin-top: 0.5rem; font-size: 0.76rem; color: #ddd; }
</style>
</head>
<body>

<div class="header">
  <h1>📚 课程资源</h1>
  <p class="viewer-count" id="viewer-count"></p>
</div>

<div id="waiting" class="waiting">
  <div class="waiting-icon">⏳</div>
  <p>等待老师推送链接</p>
</div>

<div id="links-list" class="links-list" style="display:none"></div>

<button class="copy-btn" id="copy-btn" onclick="copyLinks()">📋 复制全部链接</button>

<p class="notice">结束后 24 小时链接将自动清除</p>
<div class="footer">页面自动更新 · 无需刷新</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDclqzD6hl280LpJNVNHZ9zrwl2hgjfIIc",
  authDomain: "workshop-cad98.firebaseapp.com",
  databaseURL: "https://workshop-cad98-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "workshop-cad98",
  storageBucket: "workshop-cad98.firebasestorage.app",
  messagingSenderId: "45138485840",
  appId: "1:45138485840:web:040ee276e2f9e041c8a755"
};

const icons = ['🛠️','🎨','📝','📂','🎴','✨','📄','🎬','🔗','🖥️','📖','🔑','💎'];
const iconClass = ['icon-0','icon-1','icon-2','icon-3','icon-4','icon-5','icon-6','icon-7','icon-8','icon-9','icon-10','icon-11','icon-12'];
function getIcon(i) { return i < icons.length ? icons[i] : '🔗'; }
function getIconClass(i) { return 'icon-' + (i % iconClass.length); }

function shortUrl(url) {
  try { const u = new URL(url); return u.hostname + u.pathname.slice(0, 30) + (u.pathname.length > 30 ? '...' : ''); }
  catch { return url.slice(0, 40); }
}

let seen = {};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Presence tracking for viewer count
const presenceId = sessionStorage.getItem('wk_pid') || Math.random().toString(36).slice(2, 9);
sessionStorage.setItem('wk_pid', presenceId);
const presenceRef = db.ref('workshop/presence/' + presenceId);
db.ref('.info/connected').on('value', snap => {
  if (snap.val()) {
    presenceRef.set(true);
    presenceRef.onDisconnect().remove();
  }
});
db.ref('workshop/presence').on('value', snap => {
  const count = snap.numChildren();
  document.getElementById('viewer-count').textContent = count > 0 ? `👥 ${count} 人正在浏览` : '';
});

db.ref('workshop/links').on('value', snap => {
  const data = snap.val() || {};
  const list = document.getElementById('links-list');
  const waiting = document.getElementById('waiting');
  list.innerHTML = '';
  let anyVisible = false;

  // Sort visible links by pushedAt timestamp (push order)
  const visibleItems = Object.entries(data)
    .filter(([k, v]) => v && v.visible)
    .sort((a, b) => (a[1].pushedAt || 0) - (b[1].pushedAt || 0));

  // Mark hidden items as unseen
  Object.entries(data).forEach(([k, v]) => {
    if (!v || !v.visible) seen[parseInt(k)] = false;
  });

  visibleItems.forEach(([k, item], idx) => {
    anyVisible = true;
    const i = parseInt(k);
    const isNew = !seen[i];
    seen[i] = true;
    const displayNum = idx + 1;
    const a = document.createElement('a');
    a.className = 'link-card';
    a.href = item.url;
    a.target = '_blank';
    a.innerHTML = `
      <div class="link-icon ${getIconClass(i)}">${getIcon(i)}</div>
      <div class="link-info">
        <div class="link-num">资源 ${displayNum}</div>
        <div class="link-title">${item.title}${isNew ? '<span class="new-badge">NEW</span>' : ''}</div>
        <div class="link-url">${shortUrl(item.url)}</div>
      </div>
      <div class="arrow">›</div>`;
    list.appendChild(a);
  });

  if (anyVisible) {
    waiting.style.display = 'none';
    list.style.display = 'flex';
    document.getElementById('copy-btn').style.display = 'block';
  } else {
    waiting.style.display = 'block';
    list.style.display = 'none';
    document.getElementById('copy-btn').style.display = 'none';
  }
});

function copyLinks() {
  const lines = [];
  document.querySelectorAll('.link-card').forEach(card => {
    const title = card.querySelector('.link-title').childNodes[0].textContent.trim();
    const url = card.href;
    lines.push(`${title}\n${url}`);
  });
  const text = `📚 课程资源\n\n` + lines.join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 已复制！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制全部链接'; btn.classList.remove('copied'); }, 2500);
  });
}
</script>
</body>
</html>
