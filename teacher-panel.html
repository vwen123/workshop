<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作坊推送链接平台</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  h1 { font-size: 1.1rem; font-weight: 600; color: #222; margin-bottom: 0.25rem; }
  .sub { font-size: 0.85rem; color: #777; margin-bottom: 1.5rem; }

  .status-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; background: #fff; border-radius: 10px; border: 1px solid #e8e8e8; margin-bottom: 1.5rem; font-size: 0.85rem; color: #555; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .dot.connected { background: #22c55e; }
  .dot.error { background: #ef4444; }

  /* Card */
  .card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e8; padding: 1rem 1.1rem 1rem 0.6rem; margin-bottom: 0.85rem; display: flex; gap: 0.5rem; align-items: flex-start; transition: box-shadow 0.15s; }
  .card.editing { border-color: #1a1a1a; }
  .card.sortable-ghost { opacity: 0.35; }
  .card.sortable-drag { box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-color: #ccc; }

  /* Drag handle */
  .drag-handle { cursor: grab; color: #d0d0d0; font-size: 1.1rem; padding: 0.25rem 0.1rem; margin-top: 0.15rem; flex-shrink: 0; user-select: none; touch-action: none; line-height: 1; }
  .drag-handle:active { cursor: grabbing; }

  .card-body { flex: 1; min-width: 0; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.45rem; }
  .card-label { font-size: 0.72rem; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; }
  .badge { font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; margin-left: 6px; }
  .badge-live { background: #dcfce7; color: #166534; }
  .badge-hidden { background: #f3f4f6; color: #9ca3af; }
  .card-icons { display: flex; gap: 0.3rem; flex-shrink: 0; }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 0.92rem; color: #ccc; padding: 2px 5px; border-radius: 6px; line-height: 1; transition: color 0.15s, background 0.15s; }
  .icon-btn:hover { color: #555; background: #f3f4f6; }
  .icon-btn.edit:hover { color: #1a1a1a; }
  .icon-btn.del:hover { color: #c0392b; background: #fff3f3; }

  /* View mode */
  .card-title { font-size: 0.97rem; font-weight: 600; color: #222; margin-bottom: 0.2rem; }
  .card-url { font-size: 0.75rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.8rem; }

  /* Edit mode */
  .edit-mode { display: none; }
  .card.editing .view-mode { display: none; }
  .card.editing .edit-mode { display: block; }
  .input-field { width: 100%; padding: 0.48rem 0.7rem; border: 1px solid #e0e0e0; border-radius: 9px; font-size: 0.88rem; color: #222; background: #fafafa; margin-bottom: 0.5rem; outline: none; }
  .input-field:focus { border-color: #1a1a1a; background: #fff; }
  .input-field::placeholder { color: #bbb; }

  /* Buttons */
  .btn-row { display: flex; gap: 0.5rem; }
  .btn { flex: 1; padding: 0.55rem 0.65rem; border-radius: 9px; border: none; font-size: 0.86rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-push { background: #1a1a1a; color: #fff; }
  .btn-push:active { transform: scale(0.97); }
  .btn-push.active { background: #0a7c4e; }
  .btn-hide { background: #f0f0f0; color: #666; }
  .btn-save { background: #1a1a1a; color: #fff; }
  .btn-cancel { background: #f0f0f0; color: #666; }

  .add-btn { width: 100%; padding: 0.7rem; background: #fff; color: #555; border: 1.5px dashed #ccc; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-bottom: 1rem; transition: border-color 0.15s, color 0.15s; }
  .add-btn:hover { border-color: #888; color: #222; }
  .reset-btn { width: 100%; padding: 0.62rem; background: #fff3f3; color: #c0392b; border: 1px solid #fca5a5; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
  .reset-btn:active { transform: scale(0.98); }
  .section-title { font-size: 0.72rem; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }

  /* Student link card */
  .student-card { background: #fff; border-radius: 14px; border: 1px solid #e8e8e8; padding: 1rem 1.1rem; margin-bottom: 1.5rem; }
  .student-card-title { font-size: 0.72rem; font-weight: 700; color: #bbb; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
  .student-card-inner { display: flex; gap: 1rem; align-items: flex-start; }
  .qr-img { width: 90px; height: 90px; border-radius: 8px; border: 1px solid #eee; flex-shrink: 0; }
  .student-link-info { flex: 1; min-width: 0; }
  .student-link-label { font-size: 0.82rem; font-weight: 600; color: #222; margin-bottom: 0.3rem; }
  .student-link-url { font-size: 0.73rem; color: #aaa; word-break: break-all; margin-bottom: 0.7rem; line-height: 1.5; }
  .link-btn-row { display: flex; gap: 0.5rem; }
  .btn-copy { flex: 1; padding: 0.52rem 0.65rem; border-radius: 9px; border: none; background: #1a1a1a; color: #fff; font-size: 0.84rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn-copy:active { background: #333; }
  .btn-copy.copied { background: #0a7c4e; }
  .btn-open { flex: 1; padding: 0.52rem 0.65rem; border-radius: 9px; border: 1px solid #e0e0e0; background: #f9f9f9; color: #555; font-size: 0.84rem; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; display: block; }
</style>
</head>
<body>

<h1>工作坊推送链接平台</h1>
<p class="sub">讲到哪里，推哪条链接</p>

<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="status-text">正在连接...</span>
</div>

<div class="student-card">
  <div class="student-card-title">学员端链接</div>
  <div class="student-card-inner">
    <img class="qr-img" id="qr-img" src="" alt="QR Code">
    <div class="student-link-info">
      <div class="student-link-label">📱 扫码或分享链接给学员</div>
      <div class="student-link-url" id="student-url-text"></div>
      <div class="link-btn-row">
        <button class="btn-copy" id="copy-btn" onclick="copyStudentLink()">复制链接</button>
        <a class="btn-open" id="open-btn" href="" target="_blank">开启预览</a>
      </div>
    </div>
  </div>
</div>

<div class="section-title">链接推送</div>
<div id="cards-container"></div>

<button class="add-btn" onclick="addCard()">＋ 新增资源</button>
<button class="reset-btn" onclick="resetAll()">重置全部（收回所有链接）</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDemo-ReplaceWithYours",
  authDomain: "vwenbcclass.firebaseapp.com",
  databaseURL: "https://vwenbcclass-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vwenbcclass",
  storageBucket: "vwenbcclass.appspot.com",
  messagingSenderId: "000000000000",
  appId: "1:000000000000:web:0000000000000000"
};

// Student view URL
const STUDENT_URL = 'https://vwen123.github.io/workshop/student-view.html';
(function initStudentLink() {
  document.getElementById('student-url-text').textContent = STUDENT_URL;
  document.getElementById('open-btn').href = STUDENT_URL;
  document.getElementById('qr-img').src =
    'https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=4&data=' + encodeURIComponent(STUDENT_URL);
})();

function copyStudentLink() {
  navigator.clipboard.writeText(STUDENT_URL).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制链接'; btn.classList.remove('copied'); }, 2000);
  });
}

const DEFAULT_CARDS = [
  { title: "AI 备课与风格指令生成器", url: "https://sites.google.com/view/aieducation123/" },
  { title: "作品墙", url: "https://padlet.com/vivianeiwen123/notebooklm-30-1-7m5rga7gffprm9t7" },
  { title: "课程回馈", url: "https://forms.gle/LTirsLFThXZRiruVA" },
  { title: "Google Drive 文件", url: "https://drive.google.com/file/d/1HZek5IsbZ22RAxPyMyGg_XeLAhkggT7H/view" },
  { title: "DeckEdit 简报工具", url: "https://deckedit.com/zh-Hans" },
  { title: "Magic Eraser 背景消除", url: "https://magiceraser.org" },
  { title: "课程讲义（Google 文件）", url: "https://docs.google.com/document/d/1owwM0gpp5N6WpvhNo0j6VJnyWYu0o-rnsqZReGruZ6g/edit?tab=t.0" },
  { title: "YouTube to NotebookLM 扩展", url: "https://chromewebstore.google.com/detail/youtube-to-notebooklm/kobncfkmjelbefaoohoblamnbackjggk" },
  { title: "Slide Generator", url: "https://slidegenerator-swart.vercel.app/" },
  { title: "NotebookLM 进阶课程", url: "https://sites.google.com/view/notebooklmadvancecourse/home" },
  { title: "Google AI Studio API Keys", url: "https://aistudio.google.com/app/api-keys" },
  { title: "Gemini Gem", url: "https://gemini.google.com/gem/98259a2f3e85?usp=sharing" }
];

// Load from localStorage; auto-append new defaults
let cards = JSON.parse(localStorage.getItem('wk_cards') || 'null');
if (!cards) {
  cards = DEFAULT_CARDS.map(c => ({ ...c, id: uid() }));
} else {
  // Ensure every card has an id (migration)
  cards = cards.map(c => c.id ? c : { ...c, id: uid() });
  // Append new defaults not yet in list
  if (cards.length < DEFAULT_CARDS.length) {
    DEFAULT_CARDS.slice(cards.length).forEach(c => cards.push({ ...c, id: uid() }));
  }
  saveCards();
}

let pushState = {};
let sortable = null;

function uid() { return Math.random().toString(36).slice(2, 9); }

function saveCards() {
  localStorage.setItem('wk_cards', JSON.stringify(cards));
}

function shortUrl(url) {
  try {
    const u = new URL(url);
    const path = u.pathname.length > 1 ? u.pathname.slice(0, 26) + (u.pathname.length > 26 ? '…' : '') : '';
    return u.hostname + path;
  } catch { return url.slice(0, 40); }
}

function renderCards() {
  if (sortable) { sortable.destroy(); sortable = null; }
  const container = document.getElementById('cards-container');
  container.innerHTML = '';

  cards.forEach((card, i) => {
    const active = !!pushState[i];
    const div = document.createElement('div');
    div.className = 'card';
    div.id = 'card-' + i;
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="drag-handle" title="拖拉排序">⠿</div>
      <div class="card-body">
        <div class="card-header">
          <div class="card-label">资源 ${i + 1}
            <span class="badge ${active ? 'badge-live' : 'badge-hidden'}" id="badge-${i}">${active ? '已推送' : '未推送'}</span>
          </div>
          <div class="card-icons">
            <button class="icon-btn edit" onclick="startEdit(${i})" title="编辑">✏️</button>
            <button class="icon-btn del" onclick="deleteCard(${i})" title="删除">✕</button>
          </div>
        </div>
        <div class="view-mode">
          <div class="card-title">${card.title || '（未填写标题）'}</div>
          <div class="card-url">${shortUrl(card.url)}</div>
          <div class="btn-row">
            <button class="btn btn-push${active ? ' active' : ''}" onclick="pushLink(${i})">推送给学员</button>
            <button class="btn btn-hide" onclick="hideLink(${i})">收回</button>
          </div>
        </div>
        <div class="edit-mode">
          <input class="input-field" id="edit-title-${i}" type="text" value="${escHtml(card.title)}" placeholder="标题">
          <input class="input-field" id="edit-url-${i}" type="url" value="${escHtml(card.url)}" placeholder="https://...">
          <div class="btn-row">
            <button class="btn btn-save" onclick="saveEdit(${i})">保存</button>
            <button class="btn btn-cancel" onclick="cancelEdit(${i})">取消</button>
          </div>
        </div>
      </div>`;
    container.appendChild(div);
  });

  // Init drag-and-drop
  sortable = Sortable.create(container, {
    handle: '.drag-handle',
    animation: 150,
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',
    onEnd: onReorder
  });
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function onReorder() {
  // Read new order from DOM
  const container = document.getElementById('cards-container');
  const newOrder = Array.from(container.querySelectorAll('.card')).map(el => parseInt(el.dataset.idx));

  const oldCards = [...cards];
  const oldPush = { ...pushState };

  // Reorder cards array
  cards = newOrder.map(oldIdx => oldCards[oldIdx]);
  saveCards();

  // Rebuild Firebase with remapped indices
  if (db) {
    const newData = {};
    cards.forEach((card, newIdx) => {
      const oldIdx = newOrder[newIdx];
      if (oldPush[oldIdx] !== undefined) {
        newData[newIdx] = { visible: !!oldPush[oldIdx], title: card.title, url: card.url };
      }
    });
    db.ref('workshop/links').set(newData);
  }

  renderCards();
}

function startEdit(i) {
  document.getElementById('card-' + i).classList.add('editing');
  document.getElementById('edit-title-' + i).focus();
}
function cancelEdit(i) {
  document.getElementById('card-' + i).classList.remove('editing');
  document.getElementById('edit-title-' + i).value = cards[i].title;
  document.getElementById('edit-url-' + i).value = cards[i].url;
}
function saveEdit(i) {
  const title = document.getElementById('edit-title-' + i).value.trim();
  const url = document.getElementById('edit-url-' + i).value.trim();
  if (!title || !url) return alert('请填写标题和链接');
  cards[i] = { ...cards[i], title, url };
  saveCards();
  // If already pushed, sync to students immediately
  if (db && pushState[i]) {
    db.ref('workshop/links/' + i).set({ visible: true, title, url });
  }
  renderCards();
}

function addCard() {
  cards.push({ title: '', url: '', id: uid() });
  saveCards();
  renderCards();
  const i = cards.length - 1;
  startEdit(i);
  document.getElementById('card-' + i).scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function deleteCard(i) {
  if (!confirm('确认删除此资源卡片？')) return;
  cards.splice(i, 1);
  saveCards();
  if (db) {
    // Rebuild Firebase to reflect removed card and shifted indices
    const newData = {};
    cards.forEach((c, idx) => {
      const wasActive = pushState[idx >= i ? idx + 1 : idx];
      if (wasActive) newData[idx] = { visible: true, title: c.title, url: c.url };
    });
    db.ref('workshop/links').set(newData);
  }
  renderCards();
}

function pushLink(i) {
  if (!db) return alert('Firebase 未连接');
  if (!cards[i].title || !cards[i].url) return alert('请先填写标题和链接');
  db.ref('workshop/links/' + i).set({ visible: true, title: cards[i].title, url: cards[i].url });
}
function hideLink(i) {
  if (!db) return alert('Firebase 未连接');
  db.ref('workshop/links/' + i).set({ visible: false, title: cards[i].title, url: cards[i].url });
}
function resetAll() {
  if (!db) return alert('Firebase 未连接');
  if (!confirm('确认收回所有链接？')) return;
  const updates = {};
  cards.forEach((c, i) => { updates[i] = { visible: false, title: c.title, url: c.url }; });
  db.ref('workshop/links').set(updates);
}

// Firebase init
let db;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  db.ref('.info/connected').on('value', snap => {
    const ok = snap.val();
    document.getElementById('dot').className = 'dot ' + (ok ? 'connected' : 'error');
    document.getElementById('status-text').textContent = ok ? 'Firebase 已连接，学员端实时同步' : '连接中断，请检查网络';
  });
  db.ref('workshop/links').on('value', snap => {
    const data = snap.val() || {};
    pushState = {};
    Object.keys(data).forEach(k => { pushState[parseInt(k)] = data[k] && data[k].visible; });
    renderCards();
  });
} catch(e) {
  document.getElementById('dot').className = 'dot error';
  document.getElementById('status-text').textContent = '请先配置 Firebase';
  renderCards();
}
</script>
</body>
</html>
